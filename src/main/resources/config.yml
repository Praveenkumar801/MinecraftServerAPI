# This is the configuration file for the MinecraftServerAPI-Plugin.

# The port the API should listen on.
port: 7000

# The address the API should bind to. Default is 127.0.0.1 (localhost only).
# Set to 0.0.0.0 to listen on all interfaces (NOT recommended without a reverse proxy with TLS).
bind-address: "127.0.0.1"

# Enable swagger documentation for the API endpoints.
# WARNING: Swagger UI is served without authentication. Disable in production.
swagger: false

# If you want to enable Authentication, set this to true.
# It is not recommended to disable this. If you do, everyone can access the API.
authentication:
  enabled: true
  key: "CHANGE_ME"

# IP Whitelist - Only allow requests from specific IP addresses.
# When enabled, any request from a non-whitelisted IP will be rejected with 403 Forbidden.
ip-whitelist:
  enabled: false
  allowed-ips:
    - "127.0.0.1"
    - "::1"
    # Add more IPs here:
    # - "192.168.1.100"

# If you want to enable the debug mode, set this to true.
# This will print more information to the console.
debug: false

# Here you can turn on/off the different Webhooks.
# All webhooks are disabled by default. Enable only the ones you need.
webhooks:

  # You can set a list of URLs which should be called when the Webhook is triggered.
  # You can set multiple URLs here.
  urls:
    # - "https://example.com/webhook1"
    # - "https://example.com/webhook2"

  # A secret token sent with every outgoing webhook request as the "X-Webhook-Secret" header.
  # Your receiving endpoint should verify this value to ensure the request is authentic.
  # Leave empty to disable.
  secret: ""

  # If set to true, only the message content will be sent to the webhook endpoints
  # instead of the full JSON object with event, load_type, and message fields.
  # Example with onlyMessage: false -> {"load_type":"STARTUP","event":"server_start","message":"Server has started"}
  # Example with onlyMessage: true  -> "Server has started"
  onlyMessage: false

  # Here is a list of all available Webhooks.
  # You can enable or disable them here.
  # Or via the command /webhooks <disable/enable> <webhook>
  server_start: false
  server_stop: false
  plugin_disable: false
  plugin_enable: false
  block_break: false
  block_place: false
  block_burn: false
  block_redstone: false
  note_play: false
  sign_change: false
  enchant_item: false
  creeper_power: false
  creature_spawn: false
  entity_death: false
  entity_explode: false
  entity_shoot_bow: false
  entity_tame: false
  explosion_prime: false
  player_death: false
  brew: false
  craft_item: false
  furnace_burn: false
  furnace_smelt: false
  player_chat: false
  player_login: false
  player_command: false
  player_gamemode_change: false
  player_item_break: false
  player_join: false
  player_kick: false
  player_quit: false
  player_respawn: false
  lightning_strike: false
  weather_change: false
  thunder_change: false
  world_load: false
  world_save: false
  world_unload: false

# Here you can list an extra set of Files or Directories which should be saved by the Backup-System.
# Following directories and files are already saved by default: ["world", "world_nether", "world_the_end", "plugins", "config", "server.properties", "banned-ips.json", "banned-players.json", "ops.json", "whitelist.json"]
# e.g.: ["plugins/MyPlugin/config.yml", "plugins/MyPlugin/data/"]
backup_files: []